    <script>

        var appRoutes = ["", "ueber-uns", "leistungen", "kontakt", "impressum", "datenschutz"];
        var segments = window.location.pathname.split("/").filter(Boolean);
        var firstSegment = segments[0] || "";
        var hasRepoBase = firstSegment && appRoutes.indexOf(firstSegment) === -1;
        var basePath = hasRepoBase ? "/" + firstSegment : "";
        var redirect = sessionStorage.getItem("spa-redirect");

        if (!redirect) return;

        sessionStorage.removeItem("spa-redirect");
        var targetPath = redirect === "/" ? basePath + "/" : basePath + redirect;

          window.history.replaceState(null, "", targetPath);
        }
